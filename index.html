<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Especial: Spider-Man 🕸️</title>
  
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Alinea el contenido arriba, como en tu ejemplo */
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
      position: relative;
      background-color: #0b1528;
    }

    /* --- Imagen de fondo de Spider-Man fija --- */
    .sky-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('spiderman1.jpg'); 
      background-size: contain; 
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
    }

    /* --- BOTÓN DE ENTRADA OBLIGATORIO PARA DESBLOQUEAR AUDIO --- */
    .audio-unlocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #0b1528;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .unlock-btn {
      background: #e51b24;
      border: 6px solid #1e3a8a;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      font-size: 50px;
      cursor: pointer;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      animation: pulse 1.5s infinite;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .unlock-text {
      font-family: 'Fredoka', cursive;
      color: white;
      margin-top: 20px;
      font-size: 1.5rem;
      text-shadow: 2px 2px 0px #1e3a8a;
      text-align: center;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 27, 36, 0.7); }
      70% { transform: scale(1.08); box-shadow: 0 0 0 15px rgba(229, 27, 36, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229, 27, 36, 0); }
    }

    /* --- TARJETA SUPERIOR ESTILO CÓMIC (Inspirada en tu ejemplo) --- */
    .card {
      background: rgba(255, 255, 255, 0.95); /* Tarjeta blanca limpia */
      padding: 30px 25px 25px 25px;
      border-radius: 0 0 30px 30px; /* Bordes redondeados solo abajo */
      text-align: center;
      width: 92%;
      max-width: 440px;
      z-index: 10;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      border: 6px solid #e51b24; /* Borde rojo de Spider-Man */
      border-top: none; /* Se fusiona con la parte superior de la pantalla */
      position: relative;
      opacity: 0;
      transform: translateY(-50px); /* Animación desde arriba */
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Medallón de Araña en la parte superior central */
    .spidey-badge {
      position: absolute;
      bottom: -24px; /* Lo ubica justo en el borde inferior central */
      left: calc(50% - 25px);
      background: #1e3a8a;
      font-size: 26px;
      width: 50px;
      height: 50px;
      line-height: 46px;
      border-radius: 50%;
      border: 4px solid #e51b24;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    .titulo {
      font-family: 'Fredoka', cursive;
      color: #1e3a8a; /* Azul Spider-Man */
      font-size: 1.7rem;
      line-height: 1.3;
      margin: 0 0 10px 0;
    }

    /* Estilo del texto destacado de Spider-Man */
    .spidey-style {
      display: block;
      font-size: 2.3rem;
      color: #e51b24; /* Rojo vibrante */
      text-shadow: 2px 2px 0px #1e3a8a, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000, 1px 1px 0px #000;
      transform: rotate(-1deg);
      margin: 8px 0;
    }

    .subtitulo {
      color: #555555;
      font-size: 1.05rem;
      margin: 15px 0;
      font-style: italic;
      font-weight: bold;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      height: 70px;
      position: relative;
      margin-bottom: 10px;
    }

    button {
      font-family: 'Fredoka', cursive;
      padding: 12px 26px;
      font-size: 1.15rem;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 5px 0px rgba(0,0,0,0.15);
      transition: transform 0.2s ease, opacity 0.2s ease;
      text-decoration: none;
    }

    #btn-si {
      background-color: #0284c7; /* Azul brillante */
      color: white;
      border: 3px solid #1e3a8a; 
      z-index: 30; 
      position: relative;
    }

    #btn-no {
      background-color: #e51b24; /* Rojo */
      color: white;
      border: 3px solid #b11319;
      z-index: 20;
      position: relative;
      transition: transform 0.15s ease-out;
      outline: 40px solid transparent;
      outline-offset: -40px;
    }
  </style>
</head>
<body>

  <!-- PANTALLA RECIBIDORA PARA DESBLOQUEAR EL AUDIO -->
  <div class="audio-unlocker" id="bloqueo-audio" onclick="entrarInvitacion()">
    <button class="unlock-btn">🕷️</button>
    <div class="unlock-text">Tienes una invitación especial...<br>¡Toca para abrir!</div>
  </div>

  <div class="sky-background"></div>

  <!-- Tarjeta Blanca Adaptada en la parte superior -->
  <div class="card" id="tarjeta-invitacion">
    <h1 class="titulo">¿Quieres ir a ver <span class="spidey-style">Spider-Man</span> al cine conmigo?</h1>
    <p class="subtitulo">¡Un gran poder conlleva una gran salida!</p>
    
    <div class="buttons-container">
      <button id="btn-si" onclick="abrirWhatsApp()">¡SÍ, CLARO! 🕷️</button>
      <button id="btn-no">No 😢</button>
    </div>
    
    <div class="spidey-badge">🕸️</div>
  </div>

  <audio id="musica-spidey" loop preload="auto">
    <source id="fuente-audio" src="SpiderMan_Theme.mp3" type="audio/mpeg">
  </audio>

  <script>
    const btnNo = document.getElementById('btn-no');
    const tarjeta = document.getElementById('tarjeta-invitacion');
    const pantallaBloqueo = document.getElementById('bloqueo-audio');
    const musica = document.getElementById('musica-spidey');
    const fuenteAudio = document.getElementById('fuente-audio');
    let musicaIniciada = false;

    function entrarInvitacion() {
      if (!musicaIniciada) {
        fuenteAudio.src = "SpiderMan_Theme.mp3?v=" + new Date().getTime();
        musica.load();
        
        musica.play()
          .then(() => { musicaIniciada = true; })
          .catch((e) => console.log("Audio bloqueado:", e));
      }

      pantallaBloqueo.style.opacity = "0";
      pantallaBloqueo.style.visibility = "hidden";
      tarjeta.classList.add("show");
    }

    function moverBotonNo() {
      // Movimiento controlado para que no se salga de la pantalla en la zona superior
      const randomX = Math.floor(Math.random() * 100) + 40; 
      const randomY = Math.floor(Math.random() * 80) + 20; /* Obliga a bajar para no salirse arriba */
      btnNo.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }

    btnNo.addEventListener('mouseenter', moverBotonNo);
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moverBotonNo();
    });

    tarjeta.addEventListener('mouseleave', () => {
      btnNo.style.transform = 'translate(0px, 0px)';
    });

    function abrirWhatsApp() {
      const numero = "50661547634";
      const mensaje = encodeURIComponent("¡Sí, de todas maneras quiero ir contigo al cine a ver Spider-Man: Brand New Day! 🕷️🕸️🎬");
      
      const deepLink = `whatsapp://send?phone=${numero}&text=${mensaje}`;
      const webLink = `https://whatsapp.com{numero}&text=${mensaje}`;
      
      window.location.href = deepLink;
      
      setTimeout(() => {
        window.open(webLink, '_blank');
      }, 250);
    }
  </script>
</body>
</html>
