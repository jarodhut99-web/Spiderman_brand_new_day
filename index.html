<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Especial: Spider-Man 🕸️</title>
  
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-end; 
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
      position: relative;
      background-color: #12151c;
    }

    /* --- Imagen de fondo de Spider-Man fija --- */
    .sky-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('spiderman2.jpg'); 
      background-size: contain; 
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
    }

    /* Degradado oscuro abajo expandido para cubrir la nueva altura del texto */
    .sky-background::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 45%; 
      background: linear-gradient(to top, rgba(10, 12, 16, 0.85) 0%, rgba(10, 12, 16, 0) 100%); 
      z-index: 2;
    }

    /* --- BOTÓN DE ENTRADA OBLIGATORIO PARA DESBLOQUEAR AUDIO --- */
    .audio-unlocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #12151c;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .unlock-btn {
      background: transparent; 
      border: none; 
      border-radius: 0;
      width: auto;
      height: auto;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: pulse 1.5s infinite;
    }

    /* Tamaño controlado para el mini spiderman animado */
    .unlock-btn img {
      width: 130px;
      height: auto;
      object-fit: contain;
    }

    .unlock-text {
      font-family: 'Fredoka', cursive;
      color: white;
      margin-top: 20px;
      font-size: 1.5rem;
      text-shadow: 2px 2px 0px #1e3a8a;
      text-align: center;
    }

    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(229, 27, 36, 0)); }
      70% { transform: scale(1.08); filter: drop-shadow(0 10px 20px rgba(229, 27, 36, 0.6)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(229, 27, 36, 0)); }
    }

    /* --- CONTENEDOR INVISIBLE ELEVADO --- */
    .invitation-container {
      position: relative;
      z-index: 10;
      text-align: center;
      width: 90%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: translateY(30px);
      transition: transform 0.6s ease-out, opacity 0.5s ease;
      margin-bottom: 12vh; 
    }

    .invitation-container.show {
      opacity: 1;
      transform: translateY(0);
    }

    .titulo {
      font-family: 'Fredoka', cursive;
      color: #ffffff; 
      font-size: 1.9rem;
      line-height: 1.4;
      margin: 0;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 1), 0 0 10px rgba(229, 27, 36, 0.5);
    }

    .subtitulo {
      color: #fecb05; 
      font-size: 1.15rem;
      margin: 6px 0 12px 0;
      font-weight: bold;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 1);
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      height: 70px;
      position: relative;
      width: 100%;
    }

    button {
      font-family: 'Fredoka', cursive;
      padding: 12px 28px;
      font-size: 1.2rem;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.6);
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    }

    button:active {
      transform: scale(0.95); /* Efecto de compresión arácnida al tocar */
    }

    /* 🕸️ BOTÓN SÍ: Inspirado en el traje clásico azul y rojo */
    #btn-si {
      background-color: #005bb5; 
      color: #fecb05; /* Texto amarillo Spidey */
      border: 4px solid #e51b24; /* Borde rojo */
      z-index: 30; 
      position: relative;
      text-shadow: 2px 2px 0px #000000;
      box-shadow: 0 0 15px rgba(229, 27, 36, 0.4), inset 0 0 10px rgba(0, 0, 0, 0.5);
    }

    /* 🕷️ BOTÓN NO: Inspirado en el traje simbionte / Miles Morales */
    #btn-no {
      background-color: #111111; 
      color: #ffffff;
      border: 4px solid #b11319; /* Borde rojo oscuro */
      z-index: 20;
      position: relative;
      transition: transform 0.15s ease-out;
      outline: 40px solid transparent;
      outline-offset: -40px;
      text-shadow: 1px 1px 2px #b11319;
      box-shadow: 0 0 15px rgba(177, 19, 25, 0.6);
    }
  </style>
</head>
<body>

  <div class="audio-unlocker" id="bloqueo-audio" onclick="entrarInvitacion()">
    <button class="unlock-btn">
      <img src="spiderman3.gif" alt="Spider-Man animado">
    </button>
    <div class="unlock-text">Tienes una invitación especial...<br>¡Toca para abrir!</div>
  </div>

  <div class="sky-background"></div>

  <div class="invitation-container" id="tarjeta-invitacion">
    <h1 class="titulo">¿Quieres ir al cine conmigo?</h1>
    <p class="subtitulo">¡Un gran poder conlleva una gran salida! 🕸️</p>
    
    <div class="buttons-container">
      <button id="btn-si" onclick="abrirWhatsApp()">¡SÍ, CLARO!</button>
      <button id="btn-no">No 😢</button>
    </div>
  </div>

  <audio id="musica-spidey" loop preload="auto">
    <source id="fuente-audio" src="Music1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const btnNo = document.getElementById('btn-no');
    const tarjeta = document.getElementById('tarjeta-invitacion');
    const pantallaBloqueo = document.getElementById('bloqueo-audio');
    const musica = document.getElementById('musica-spidey');
    const fuenteAudio = document.getElementById('fuente-audio');
    let musicaIniciada = false;

    function entrarInvitacion() {
      if (!musicaIniciada) {
        fuenteAudio.src = "Music1.mp3?v=" + new Date().getTime();
        musica.load();
        
        musica.play()
          .then(() => { musicaIniciada = true; })
          .catch((e) => console.log("Audio blocked:", e));
      }

      pantallaBloqueo.style.opacity = "0";
      pantallaBloqueo.style.visibility = "hidden";
      tarjeta.classList.add("show");
    }

    function moverBotonNo() {
      const randomX = Math.floor(Math.random() * 100) + 40; 
      const randomY = Math.floor(Math.random() * -80) - 20; 
      btnNo.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }

    btnNo.addEventListener('mouseenter', moverBotonNo);
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moverBotonNo();
    });

    tarjeta.addEventListener('mouseleave', () => {
      btnNo.style.transform = 'translate(0px, 0px)';
    });

    function abrirWhatsApp() {
      const numero = "50661547634";
      const mensaje = encodeURIComponent("¡Sí, si quiero ir contigo al cine a ver Spider! 🕷️🕸️🎬");
      
      const deepLink = `whatsapp://send?phone=${numero}&text=${mensaje}`;
      const webLink = `https://whatsapp.com{numero}&text=${mensaje}`;
      
      window.location.href = deepLink;
      
      setTimeout(() => {
        window.open(webLink, '_blank');
      }, 250);
    }
  </script>
</body>
</html>
